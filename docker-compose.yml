x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

services:
  vigil:
    build: .
    ports:
      - "3200:3200"
    environment:
      - NODE_ENV=production
      - PORT=3200
      - DATABASE_URL=postgresql://vigil:${POSTGRES_PASSWORD}@postgres:5432/vigil
      - REDIS_URL=redis://redis:6379
      - GITHUB_APP_ID=${GITHUB_APP_ID?GITHUB_APP_ID is required}
      - GITHUB_APP_PRIVATE_KEY=${GITHUB_APP_PRIVATE_KEY?GITHUB_APP_PRIVATE_KEY is required}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET?GITHUB_WEBHOOK_SECRET is required}
      - GROQ_API_KEY=${GROQ_API_KEY?GROQ_API_KEY is required}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - SESSION_SECRET=${SESSION_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
      - dokploy-network
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3200/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    restart: unless-stopped

  landing:
    build:
      context: .
      dockerfile: packages/landing/Dockerfile
    networks:
      - dokploy-network
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vigil
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?POSTGRES_PASSWORD is required}
      POSTGRES_DB: vigil
    volumes:
      - pgdata:/var/lib/postgresql/data
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vigil"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 200mb --maxmemory-policy noeviction
    volumes:
      - redisdata:/data
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped

volumes:
  pgdata:
    name: vigil_pgdata
  redisdata:
    name: vigil_redisdata

networks:
  dokploy-network:
    external: true
