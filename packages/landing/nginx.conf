server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Dashboard SPA — try file, then fallback to dashboard index
    location /dashboard/ {
        try_files $uri $uri/ /dashboard/index.html;
    }

    # Admin SPA — try file, then fallback to admin index
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    # Redirect bare paths (no locale) to /en/ — fixes GitHub App post-install redirect
    # and any direct links without locale prefix
    location ~ ^/(docs|pricing|about|blog|checkout|privacy|terms)(/.*)?$ {
        return 301 /en$request_uri;
    }

    # Landing SPA fallback — try exact file, then .html extension, then 404
    location / {
        try_files $uri $uri.html $uri/ /404.html;
    }

    # Cache static assets
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /brand/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-XSS-Protection "0" always;

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}
