<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Vigil — The Sentinel">
  <title>Vigil — The Sentinel</title>
  <!--
    Concept 1: "The Sentinel"

    A shield-like form constructed from a V that opens upward (vigilance)
    with a nested check mark in negative space (verification).
    The outer form is protective, the inner reveals purpose.

    Grid: 100x100, 8px base unit
    Golden ratio: key proportions at 38.2% and 61.8%
    Construction: overlapping angular paths forming layered depth
  -->
  <defs>
    <linearGradient id="depth" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <mask id="check-cutout">
      <rect width="100" height="100" fill="white"/>
      <!-- Negative space checkmark revealed inside the shield -->
      <path d="M 35 52 L 45 62 L 65 38" fill="none" stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    </mask>
  </defs>

  <!-- Outer shield: V-shape opening upward, embracing -->
  <g id="shield">
    <!-- Left wing -->
    <path d="M 50 88 L 12 32 L 12 20 C 12 14, 18 10, 24 12 L 50 28"
          fill="url(#depth)" opacity="0.85"/>
    <!-- Right wing -->
    <path d="M 50 88 L 88 32 L 88 20 C 88 14, 82 10, 76 12 L 50 28"
          fill="url(#depth)"/>
  </g>

  <!-- Inner core: lighter panel with checkmark cutout -->
  <g id="core" mask="url(#check-cutout)">
    <path d="M 50 80 L 24 34 L 24 24 L 50 36 L 76 24 L 76 34 Z"
          fill="#162040"/>
  </g>

  <!-- Verification point: amber glow at convergence -->
  <circle cx="50" cy="88" r="4" fill="#e8a820"/>
  <circle cx="50" cy="88" r="8" fill="#e8a820" opacity="0.15"/>

  <!-- Top accent: two sentinel peaks -->
  <g id="peaks" fill="none" stroke="#e8a820" stroke-width="1.5" stroke-linecap="round">
    <path d="M 12 20 L 12 14"/>
    <path d="M 88 20 L 88 14"/>
  </g>
</svg>
